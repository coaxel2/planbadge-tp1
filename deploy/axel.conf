# Anti-spam : zone de limitation de débit pour le Livre d'or (contexte http)
limit_req_zone $binary_remote_addr zone=livredor:10m rate=60r/m;

server {
    server_name axel.planbadge.fr;

    root /var/www/axel;
    index index.html index.htm;

    location / {
        try_files $uri $uri/ =404;
    }

    # --- Mission ultime : reverse-proxy vers l'app "Livre d'or" (conteneur Docker) ---
    location = /livredor { return 301 /livredor/; }
    location /livredor/ {
        limit_req zone=livredor burst=30 nodelay;
        proxy_pass http://127.0.0.1:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/axel.planbadge.fr/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/axel.planbadge.fr/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = axel.planbadge.fr) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name axel.planbadge.fr;
    return 404; # managed by Certbot


}
